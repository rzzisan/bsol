services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deploy/dokploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dokploy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dokploy
    env_file:
      - .env
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - backend-storage:/var/www/html/storage
    expose:
      - "80"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dokploy
    env_file:
      - .env
    command: >
      sh -lc "php artisan queue:work --verbose --tries=${QUEUE_WORKER_TRIES:-3} --timeout=${QUEUE_WORKER_TIMEOUT:-90}"
    volumes:
      - backend-storage:/var/www/html/storage
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
